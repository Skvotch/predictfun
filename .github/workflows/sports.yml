name: Sports Predictor

on:
  schedule:
    - cron: '0 6,12,18,22 * * *'  # 4 times a day (6, 12, 18, 22 UTC)
  workflow_dispatch:

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install requests
          
      - name: Run predictor
        run: python sports_predictor.py